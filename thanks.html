<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Received | Lakshmi Tailors</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandGreen: '#0f766e', 
                        brandYellow: '#eab308', 
                    }
                }
            }
        }
    </script>
    
    <!-- ⏱️ AUTOMATIC REDIRECT LOGIC -->
    <script>
        let countdownTime = 5; // seconds until redirect
        function startRedirectTimer() {
            const timerDisplay = document.getElementById('countdown-text');
            
            const interval = setInterval(() => {
                countdownTime--;
                if (timerDisplay) {
                    timerDisplay.textContent = `Redirecting to home page in ${countdownTime}s...`;
                }
                
                if (countdownTime <= 0) {
                    clearInterval(interval);
                    window.location.href = '/'; // Routes back to home page
                }
            }, 1000);
        }
        window.onload = startRedirectTimer;
    </script>

    <style>
        /* 🧵 Custom Sewing Needle & Thread Animation */
        .sewing-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem auto;
        }

        .fabric-line {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(to right, #eab308, #eab308 8px, transparent 8px, transparent 16px);
            border-radius: 2px;
        }

        .needle {
            position: absolute;
            top: 10px;
            left: 45px;
            width: 4px;
            height: 50px;
            background: #cbd5e1;
            border-radius: 2px;
            animation: stitch 1.5s ease-in-out infinite alternate;
        }

        .needle::after {
            content: '';
            position: absolute;
            top: 6px;
            left: 1px;
            width: 2px;
            height: 10px;
            background: #0f766e;
            border-radius: 50%;
        }

        .thread {
            position: absolute;
            top: 12px;
            left: 48px;
            width: 30px;
            height: 40px;
            border: 2px solid #eab308;
            border-left: transparent;
            border-bottom: transparent;
            border-radius: 0 20px 20px 0;
            transform-origin: left top;
            animation: thread-move 1.5s ease-in-out infinite alternate;
        }

        @keyframes stitch {
            0% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(22px) rotate(0deg); }
            100% { transform: translateY(0) rotate(5deg); }
        }

        @keyframes thread-move {
            0% { transform: scaleX(1) rotate(0deg); }
            50% { transform: scaleX(0.7) rotate(-10deg); }
            100% { transform: scaleX(1) rotate(0deg); }
        }

        .fade-in {
            animation: opacityUp 1s ease forwards;
            opacity: 0;
        }
        @keyframes opacityUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white p-8 md:p-12 rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.04)] border border-gray-100 text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-brandGreen via-brandYellow to-brandGreen"></div>
        
        <!-- 🧵 Animation Wrapper -->
        <div class="sewing-container">
            <div class="needle"></div>
            <div class="thread"></div>
            <div class="fabric-line"></div>
        </div>

        <!-- Success Message Texts -->
        <h1 class="fade-in text-3xl md:text-4xl font-black text-brandGreen mb-4 tracking-tight" style="transform: translateY(20px); animation-delay: 0.2s;">
            Stitched to Perfection!
        </h1>
        
        <p class="fade-in text-gray-500 font-medium text-base md:text-lg mb-2 max-w-sm mx-auto" style="transform: translateY(20px); animation-delay: 0.4s;">
            Your enquiry has been securely logged into our design system.
        </p>

        <!-- ⏱️ Live Ticking Countdown Subtext -->
        <p id="countdown-text" class="fade-in text-xs font-bold tracking-wider text-brandYellow uppercase mb-8" style="transform: translateY(20px); animation-delay: 0.5s;">
            Redirecting to home page in 5s...
        </p>

        <!-- Information Banner Card -->
        <div class="fade-in bg-green-50/60 border border-green-100 rounded-2xl p-4 mb-8 text-left flex items-start gap-3" style="transform: translateY(20px); animation-delay: 0.6s;">
            <div class="bg-brandGreen text-white p-2 rounded-xl mt-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </div>
            <div>
                <h4 class="font-bold text-brandGreen text-sm mb-0.5">What happens next?</h4>
                <p class="text-xs text-gray-600 font-medium leading-relaxed">Our senior styling master will review your custom requirements and connect with you on your contact number shortly.</p>
            </div>
        </div>

        <!-- Fallback Return Action Button -->
        <div class="fade-in" style="transform: translateY(20px); animation-delay: 0.8s;">
            <a href="/" class="inline-flex items-center justify-center bg-brandGreen text-white font-bold px-8 py-3.5 rounded-xl shadow-lg hover:bg-opacity-90 transition gap-2 tracking-wider text-sm uppercase">
                ← Return To Home
            </a>
        </div>
        
    </div>

</body>
</html>
